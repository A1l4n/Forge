# Fly.io app config for Forge.
#
# Quick start (one-time, ~5 min):
#   1. Install flyctl:   iwr https://fly.io/install.ps1 -useb | iex   (Windows)
#                        curl -L https://fly.io/install.sh | sh        (mac/linux)
#   2. flyctl auth signup     (free; takes a credit card but no charge on hobby plan)
#   3. Edit this file: change `app = "forge-luna"` to a globally-unique name.
#   4. flyctl launch --copy-config --no-deploy
#      (picks org + region; reuses this fly.toml)
#   5. flyctl volumes create forge_data --region iad --size 1
#      (persistent /data — sqlite db survives restarts)
#   6. SET YOUR SECRETS — both required:
#        flyctl secrets set FORGE_AUTH_TOKEN=$(openssl rand -hex 24)
#        flyctl secrets set GROQ_API_KEY=gsk_...
#      (or CLAUDE_API_KEY, GLM_API_KEY, etc. for other backends)
#      Save the FORGE_AUTH_TOKEN value somewhere — you type it once on
#      first load and the browser remembers it.
#   7. flyctl deploy
#
# Subsequent deploys: just `flyctl deploy`.
# After deploy: `flyctl status` prints https://your-app.fly.dev — open it,
# paste the FORGE_AUTH_TOKEN once, and you're in. The URL is publicly
# routable but useless without the token.

app = "luna-forge-eu"     # globally unique — EU deployment for Binance access
primary_region = "ams"   # Amsterdam — outside US, Binance.com accessible

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  # Forge-specific env. Override the backend by editing this:
  # FORGE_BACKEND = "groq"

# Persistent volume — uncomment AFTER creating the volume on Fly.
# First deploy: leave commented so the app boots without a volume (Luna's
# memory will be ephemeral until the volume is mounted).
# Then: in the Fly dashboard for this app, go to Storage → Create volume,
# name it `forge_data`, size 1 GB, same region as the app. Uncomment these
# 3 lines, push, and redeploy.
#
# [[mounts]]
#   source = "forge_data"
#   destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Always-on — Luna monitors trades continuously
  auto_start_machines = true
  min_machines_running = 1     # Keep warm for Binance monitoring

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
